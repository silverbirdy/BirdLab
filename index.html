<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdLab</title>
    <meta name="description" content="BirdLab - Software Development Studio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 3rem;
            max-width: 720px;
        }

        .tag {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #555;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -0.045em;
            line-height: 1.05;
            margin-bottom: 2rem;
        }

        .desc {
            font-size: 1.05rem;
            color: #666;
            line-height: 1.7;
            max-width: 400px;
            margin-bottom: 3.5rem;
        }

        .link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: #fafafa;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding-bottom: 2px;
            border-bottom: 1px solid #333;
            transition: border-color 0.2s;
        }

        .link:hover {
            border-color: #fafafa;
        }

        .link svg {
            transition: transform 0.2s;
        }

        .link:hover svg {
            transform: translateX(3px);
        }

        footer {
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #333;
            font-size: 0.75rem;
        }

        footer a {
            color: #444;
            text-decoration: none;
            transition: color 0.15s;
        }

        footer a:hover {
            color: #888;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        @media (max-width: 640px) {
            main { padding: 2rem 1.5rem; }
            footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; align-items: flex-start; }
        }
    </style>
</head>
<body>

<main>
    <p class="tag">Software Studio</p>
    <h1>BirdLab</h1>
    <p class="desc">Build fast. Ship clean.</p>
    <a href="mailto:silverbird.dev@gmail.com" class="link">
        Get in touch
        <svg width="14" height="14" fill="none" viewBox="0 0 14 14"><path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
</main>

<footer>
    <span>&copy; 2026 BirdLab</span>
    <div class="footer-links">
        <a href="https://github.com/silverbirdy" target="_blank" rel="noopener">GitHub</a>
    </div>
</footer>

</body>
</html>
