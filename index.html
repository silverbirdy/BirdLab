<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdLab</title>
    <meta name="description" content="BirdLab - 응용 소프트웨어 개발 및 공급">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #191f28;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #b0b8c1;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.3;
            margin-bottom: 1.25rem;
        }

        h1 span {
            color: #3182f6;
        }

        .desc {
            font-size: 1.05rem;
            color: #8b95a1;
            line-height: 1.8;
            margin-bottom: 3rem;
            word-break: keep-all;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            background: #3182f6;
            color: #fff;
            border-radius: 14px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.15s;
        }

        .contact-btn:hover {
            background: #1b6ef3;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(49, 130, 246, 0.25);
        }

        footer {
            padding: 2rem;
            text-align: center;
            color: #d1d6db;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        footer a {
            color: #d1d6db;
            text-decoration: none;
        }

        footer a:hover {
            color: #8b95a1;
        }
    </style>
</head>
<body>

<main>
    <div class="logo">BirdLab</div>
    <h1><span>소프트웨어</span>를<br>만듭니다</h1>
    <p class="desc">응용 소프트웨어 개발 및 공급</p>
    <a href="mailto:silverbirdy@gmail.com" class="contact-btn">
        문의하기
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
</main>

<footer>
    &copy; 2026 BirdLab<br>
    <a href="https://github.com/silverbirdy" target="_blank" rel="noopener">GitHub</a>
</footer>

</body>
</html>
